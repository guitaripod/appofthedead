name: Release to App Store Connect

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "CFBundleVersion for this upload"
        required: true

jobs:
  upload:
    name: Archive, sign, and upload
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Guard against beta build host
        run: |
          sw_vers
          BUILD=$(sw_vers -buildVersion)
          if [[ "$BUILD" =~ [A-Z]5[0-9]+[a-z]$ ]]; then
            echo "::error::Runner macOS build $BUILD looks like a beta — App Store will reject (ITMS-90111)."
            exit 1
          fi

      # mlx-swift compiles Metal shaders; Xcode 26+ ships the Metal compiler as a
      # separate downloadable component that is absent on fresh runners.
      - name: Install Metal toolchain
        run: xcodebuild -downloadComponent MetalToolchain

      - name: Import signing identity
        run: |
          KEYCHAIN=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo -n "${{ secrets.SIGNING_P12_BASE64 }}" | base64 --decode -o $RUNNER_TEMP/signing.p12
          security import $RUNNER_TEMP/signing.p12 -k "$KEYCHAIN" -P "${{ secrets.P12_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/aotd-appstore.mobileprovision

      - name: Set build number
        run: |
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*;/CURRENT_PROJECT_VERSION = ${{ github.event.inputs.build_number }};/g" aotd.xcodeproj/project.pbxproj

      - name: Archive
        run: |
          # Signing lives on the app target's Release config in the pbxproj
          # (manual, iphoneos-only) — global xcodebuild overrides would leak onto
          # RevenueCat's SPM targets, which reject profiles.
          xcodebuild -project aotd.xcodeproj \
            -scheme aotd \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/aotd.xcarchive \
            -scmProvider system \
            -skipMacroValidation \
            archive

      - name: Export IPA (App Store, generates SwiftSupport)
        run: |
          # -exportArchive (not a manual zip) so the IPA carries the SwiftSupport
          # folder Apple requires (ITMS-90426) now that the app embeds many Swift
          # dylibs (mlx-swift-lm, swift-nio, swift-crypto, swift-syntax macros).
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>P4DQK6SRKR</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.marcusziade.aotd</key>
              <string>aotd App Store 2026</string>
            </dict>
            <key>stripSwiftSymbols</key><true/>
            <key>uploadSymbols</key><true/>
            <key>destination</key><string>export</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/aotd.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"
          echo "--- export contents ---"; ls -la "$RUNNER_TEMP/export"
          IPA=$(ls "$RUNNER_TEMP/export"/*.ipa | head -1)
          echo "IPA=$IPA"
          echo "--- SwiftSupport present? ---"; unzip -l "$IPA" | grep -i SwiftSupport | head -5 || echo "WARNING: no SwiftSupport in IPA"
          cp "$IPA" "$RUNNER_TEMP/export/aotd.ipa" 2>/dev/null || true

      - name: Validate IPA (surface ITMS errors synchronously)
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "${{ secrets.ASC_API_KEY_P8_BASE64 }}" | base64 --decode -o ~/.appstoreconnect/private_keys/AuthKey_DSS2FFU68G.p8
          xcrun altool --validate-app -f $RUNNER_TEMP/export/aotd.ipa -t ios \
            --apiKey DSS2FFU68G \
            --apiIssuer a5ebdab5-0ceb-463c-8151-195b902f117b \
            --output-format json

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app -f $RUNNER_TEMP/export/aotd.ipa -t ios \
            --apiKey DSS2FFU68G \
            --apiIssuer a5ebdab5-0ceb-463c-8151-195b902f117b
